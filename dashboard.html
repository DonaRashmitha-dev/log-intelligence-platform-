<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --card: #161b22; --border: #21262d;
  --accent: #58a6ff; --text: #c9d1d9; --dim: #6e7681; --bright: #f0f6fc;
  --err: #f85149; --warn: #d29922; --ok: #3fb950;
  --err-bg: #f8514918; --warn-bg: #d2992218; --ok-bg: #3fb95018;
  --font: 'JetBrains Mono', monospace;
}
html, body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; min-height: 100vh; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); }

/* HEADER */
header {
  background: var(--card); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px; position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; color: var(--bright); letter-spacing: 0.05em; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.header-right { display: flex; align-items: center; gap: 20px; }
.status-row { display: flex; gap: 14px; }
.status-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--dim); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
.dot.green { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
.dot.red { background: var(--err); }
#clock { font-size: 11px; color: var(--dim); font-variant-numeric: tabular-nums; }

/* LAYOUT */
main { display: grid; grid-template-columns: 1fr 300px; grid-template-rows: auto auto 1fr; gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }

/* CARD */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; }
.card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 3px; font-weight: 600; letter-spacing: 0.05em; background: var(--accent); color: #000; }

/* QUERY */
.query-panel { grid-column: 1; }
.query-input-row { display: flex; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
#query-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  color: var(--bright); font-family: var(--font); font-size: 13px; padding: 8px 12px; outline: none;
}
#query-input:focus { border-color: var(--accent); }
#query-btn {
  background: var(--accent); color: #000; border: none; border-radius: 4px;
  font-family: var(--font); font-size: 12px; font-weight: 700; padding: 0 18px;
  cursor: pointer; letter-spacing: 0.05em; white-space: nowrap;
}
#query-btn:disabled { opacity: 0.4; cursor: default; }
.answer-wrap { padding: 16px; min-height: 80px; }
.answer-box { color: var(--text); white-space: pre-wrap; line-height: 1.7; }
.answer-box.thinking { color: var(--dim); font-style: italic; }
.cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); margin-left: 1px; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
@keyframes blink { 50% { opacity: 0; } }
.err-banner { display: none; padding: 10px 16px; background: var(--err-bg); border-left: 3px solid var(--err); color: var(--err); font-size: 12px; margin: 12px 16px; border-radius: 2px; }
.err-banner.show { display: block; }

/* SOURCE CARDS */
.sources-wrap { display: flex; flex-direction: column; gap: 8px; padding: 12px 16px; }
.source-card { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; }
.source-card.sev-error { border-left: 3px solid var(--err); background: var(--err-bg); }
.source-card.sev-warn { border-left: 3px solid var(--warn); background: var(--warn-bg); }
.source-card.sev-info { border-left: 3px solid var(--ok); background: var(--ok-bg); }
.source-card.sev-critical { border-left: 3px solid #ff6b6b; background: #ff6b6b18; }
.source-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.source-msg { color: var(--text); font-size: 12px; margin-bottom: 6px; }
.source-meta { font-size: 11px; color: var(--dim); }
.score-wrap { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.score-bg { flex: 1; height: 3px; background: var(--border); border-radius: 2px; }
.score-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.score-label { font-size: 10px; color: var(--dim); min-width: 28px; text-align: right; }

/* SEV BADGE */
.sev { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 2px; letter-spacing: 0.05em; }
.sev.error { background: var(--err-bg); color: var(--err); border: 1px solid var(--err); }
.sev.warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
.sev.info { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); }
.sev.critical { background: #ff6b6b18; color: #ff6b6b; border: 1px solid #ff6b6b; }

/* METRICS */
.metrics-panel { grid-column: 2; grid-row: 1 / 3; }
.metric { padding: 16px; border-bottom: 1px solid var(--border); }
.metric:last-child { border-bottom: none; }
.metric-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.metric-value { font-size: 28px; font-weight: 700; color: var(--bright); line-height: 1; margin-bottom: 4px; }
.metric-value.red { color: var(--err); }
.metric-sub { font-size: 11px; color: var(--dim); }

/* LOG STREAM */
.logs-panel { grid-column: 1; }
.logs-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-btn { background: transparent; border: 1px solid var(--border); color: var(--dim); font-family: var(--font); font-size: 11px; padding: 3px 10px; border-radius: 3px; cursor: pointer; font-weight: 500; }
.filter-btn.active-all, .filter-btn.active-error, .filter-btn.active-warn, .filter-btn.active-info { background: var(--accent); color: #000; border-color: var(--accent); }
.refresh-info { margin-left: auto; font-size: 11px; color: var(--dim); }
table { width: 100%; border-collapse: collapse; }
th { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
.row-error td { background: var(--err-bg); }
.row-warn td { background: var(--warn-bg); }
.row-error:hover td, .row-warn:hover td, tr:hover td { filter: brightness(1.15); }
.td-id { color: var(--dim); font-size: 11px; }
.td-source { color: var(--accent); }
.td-ts { color: var(--dim); font-size: 11px; white-space: nowrap; }
.empty-row td { text-align: center; color: var(--dim); padding: 32px; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>LOG.INTEL</div>
  <div class="header-right">
    <div class="status-row">
      <div class="status-item"><div class="dot" id="dot-collector"></div><span>collector</span></div>
      <div class="status-item"><div class="dot" id="dot-agent"></div><span>agent</span></div>
    </div>
    <span id="clock"></span>
  </div>
</header>

<main>
  <!-- AI QUERY -->
  <div class="card query-panel">
    <div class="card-header">
      <span class="card-title">AI Query</span>
      <span class="badge">GPT-RAG</span>
    </div>
    <div class="query-input-row">
      <input id="query-input" type="text" value="system health summary" placeholder="Ask about your logs..." />
      <button id="query-btn">RUN</button>
    </div>
    <div id="query-err" class="err-banner"></div>
    <div class="answer-wrap">
      <div id="answer-box" class="answer-box thinking">Waiting...</div>
    </div>
    <div id="sources-wrap" class="sources-wrap"></div>
  </div>

  <!-- METRICS -->
  <div class="card metrics-panel">
    <div class="card-header"><span class="card-title">Metrics</span></div>
    <div class="metric">
      <div class="metric-label">Total Logs</div>
      <div class="metric-value" id="m-total">--</div>
      <div class="metric-sub" id="m-total-sub">loading...</div>
    </div>
    <div class="metric">
      <div class="metric-label">Error Count</div>
      <div class="metric-value red" id="m-errors">--</div>
      <div class="metric-sub" id="m-errors-sub"></div>
    </div>
    <div class="metric">
      <div class="metric-label">Latest Anomaly</div>
      <div class="metric-value" style="font-size:14px" id="m-anomaly">--</div>
    </div>
  </div>

  <!-- LOG STREAM -->
  <div class="card logs-panel">
    <div class="card-header"><span class="card-title">Log Stream</span><span id="logs-spinner" style="display:none" class="spinner"></span></div>
    <div class="logs-toolbar">
      <button class="filter-btn active-all" data-sev="all">ALL</button>
      <button class="filter-btn" data-sev="error">ERROR</button>
      <button class="filter-btn" data-sev="warn">WARN</button>
      <button class="filter-btn" data-sev="info">INFO</button>
      <button class="filter-btn" data-sev="debug">DEBUG</button>
      <span class="refresh-info" id="refresh-info">auto-refresh 30s</span>
    </div>
    <div id="logs-err" class="err-banner"></div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>ID</th><th>Source</th><th>Severity</th><th>Message</th><th>Timestamp</th></tr></thead>
        <tbody id="logs-tbody"><tr class="empty-row"><td colspan="5">Loading logs...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const AGENT   = 'http://localhost:8002';
const INGEST  = 'http://localhost:8001';

let allLogs   = [];
let activeSev = 'all';

// CLOCK
function tickClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}
setInterval(tickClock, 1000); tickClock();

// STATUS DOTS
async function checkStatus() {
  for (const [id, url] of [['dot-collector', INGEST+'/health'], ['dot-agent', AGENT+'/health']]) {
    const dot = document.getElementById(id);
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(3000) });
      dot.className = r.ok ? 'dot green' : 'dot red';
    } catch { dot.className = 'dot red'; }
  }
}
setInterval(checkStatus, 10000); checkStatus();

// METRICS from /stats
async function updateMetrics() {
  try {
    const r = await fetch(AGENT + '/stats');
    if (!r.ok) throw new Error();
    const s = await r.json();
    document.getElementById('m-total').textContent = Number(s.total).toLocaleString();
    document.getElementById('m-total-sub').textContent = s.anomalies + ' EWMA anomalies';
    document.getElementById('m-errors').textContent = Number(s.errors).toLocaleString();
    document.getElementById('m-errors-sub').textContent = s.total
      ? ((s.errors / s.total) * 100).toFixed(1) + '% error rate' : '';
    document.getElementById('m-anomaly').textContent = s.last_critical
      ? fmtTs(s.last_critical) : 'none detected';
  } catch {
    document.getElementById('m-total-sub').textContent = 'agent offline';
  }
}

// SEVERITY helpers
function sevClass(s) {
  if (!s) return 'info';
  const v = s.toLowerCase();
  if (v === 'critical') return 'critical';
  if (v === 'error' || v === 'err') return 'error';
  if (v === 'warn' || v === 'warning') return 'warn';
  return 'info';
}
function badgeHtml(s) {
  const c = sevClass(s);
  return `<span class="sev ${c}">${(s||'info').toUpperCase()}</span>`;
}
function fmtTs(ts) {
  if (!ts) return '--';
  try { return new Date(ts).toLocaleString(); } catch { return ts; }
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// QUERY
const queryInput  = document.getElementById('query-input');
const queryBtn    = document.getElementById('query-btn');
const answerBox   = document.getElementById('answer-box');
const sourcesWrap = document.getElementById('sources-wrap');
const queryErr    = document.getElementById('query-err');

async function runQuery(q) {
  queryBtn.disabled = true;
  queryBtn.textContent = 'RUN';
  answerBox.className = 'answer-box thinking';
  answerBox.textContent = 'Thinking...';
  sourcesWrap.innerHTML = '';
  queryErr.className = 'err-banner';

  try {
    const r = await fetch(AGENT + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();

    answerBox.className = 'answer-box';
    await typeAnswer(answerBox, data.answer || '(no answer)');

    if (data.sources && data.sources.length) {
      data.sources.forEach(src => {
        const sc = sevClass(src.severity);
        const pct = src.score != null ? Math.round(src.score * 100) : 0;
        const card = document.createElement('div');
        card.className = `source-card sev-${sc}`;
        card.innerHTML = `
          <div class="source-top">${badgeHtml(src.severity)}<span class="source-meta">${esc(src.source||'')} &middot; ${fmtTs(src.source_ts)}</span></div>
          <div class="source-msg">${esc(src.message||'')}</div>
          <div class="score-wrap"><div class="score-bg"><div class="score-fill" style="width:${pct}%"></div></div><span class="score-label">${pct}%</span></div>`;
        sourcesWrap.appendChild(card);
        if (!allLogs.find(l => l.id === src.id)) {
          allLogs.unshift({ id: src.id, source: src.source||'--', severity: src.severity||'info', message: src.message||'', source_ts: src.source_ts||null });
        }
      });
      renderLogs();
      updateMetrics();
    }
  } catch (err) {
    answerBox.className = 'answer-box';
    answerBox.textContent = '';
    queryErr.textContent = 'Cannot reach agent. Check that it is running on port 8002 with CORS enabled.';
    queryErr.className = 'err-banner show';
  } finally {
    queryBtn.disabled = false;
    queryBtn.textContent = 'RUN';
  }
}

async function typeAnswer(el, text) {
  el.textContent = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);
  const chars = [...text];
  const chunk = Math.max(1, Math.floor(chars.length / 60));
  for (let i = 0; i < chars.length; i += chunk) {
    el.insertBefore(document.createTextNode(chars.slice(i, i + chunk).join('')), cursor);
    await sleep(16);
  }
  cursor.remove();
}

queryBtn.addEventListener('click', () => { const q = queryInput.value.trim(); if (q) runQuery(q); });
queryInput.addEventListener('keydown', e => { if (e.key === 'Enter') { const q = queryInput.value.trim(); if (q) runQuery(q); } });

// LOGS TABLE
const logsTbody   = document.getElementById('logs-tbody');
const logsSpinner = document.getElementById('logs-spinner');
const logsErr     = document.getElementById('logs-err');
const refreshInfo = document.getElementById('refresh-info');
let nextRefresh   = 30;

async function fetchLogs() {
  logsSpinner.style.display = 'inline-block';
  logsErr.className = 'err-banner';
  try {
    const r = await fetch(AGENT + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: 'show all recent logs' }),
    });
    if (!r.ok) throw new Error();
    const data = await r.json();
    if (data.sources) {
      data.sources.forEach(s => {
        if (!allLogs.find(l => l.id === s.id)) {
          allLogs.push({ id: s.id, source: s.source||'--', severity: s.severity||'info', message: s.message||'', source_ts: s.source_ts||null });
        }
      });
      allLogs.sort((a,b) => {
        if (!a.source_ts) return 1; if (!b.source_ts) return -1;
        return new Date(b.source_ts) - new Date(a.source_ts);
      });
      renderLogs();
      updateMetrics();
    }
  } catch {
    if (allLogs.length === 0) {
      logsErr.textContent = 'Cannot reach agent on port 8002.';
      logsErr.className = 'err-banner show';
    }
  } finally {
    logsSpinner.style.display = 'none';
  }
}

function renderLogs() {
  const filtered = activeSev === 'all' ? allLogs : allLogs.filter(l => sevClass(l.severity) === activeSev);
  if (filtered.length === 0) {
    logsTbody.innerHTML = `<tr class="empty-row"><td colspan="5">No logs${activeSev !== 'all' ? ' matching filter' : ''}</td></tr>`;
    return;
  }
  logsTbody.innerHTML = filtered.map(l => {
    const sc = sevClass(l.severity);
    return `<tr class="row-${sc}">
      <td class="td-id">${esc(String(l.id).substring(0,10))}</td>
      <td class="td-source">${esc(l.source)}</td>
      <td>${badgeHtml(l.severity)}</td>
      <td>${esc(l.message)}</td>
      <td class="td-ts">${fmtTs(l.source_ts)}</td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    activeSev = btn.dataset.sev;
    btn.className = `filter-btn active-${activeSev}`;
    renderLogs();
  });
});

function startRefreshTimer() {
  setInterval(() => {
    nextRefresh--;
    refreshInfo.textContent = `refresh in ${nextRefresh}s`;
    if (nextRefresh <= 0) { refreshInfo.textContent = 'auto-refresh 30s'; fetchLogs(); nextRefresh = 30; }
  }, 1000);
}

// INIT
(async function init() {
  await Promise.all([fetchLogs(), runQuery('system health summary')]);
  updateMetrics();
  startRefreshTimer();
})();
</script>
</body>
</html>
