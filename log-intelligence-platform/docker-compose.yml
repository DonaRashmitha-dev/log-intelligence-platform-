version: "3.9"

x-db-env: &db-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-loguser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-logdb}

x-redis-env: &redis-env
  REDIS_URL: redis://redis:6379

x-ollama-env: &ollama-env
  OLLAMA_URL: http://ollama:11434
  OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
  OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-tinyllama}

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: logdb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-logdb}
      POSTGRES_USER:     ${POSTGRES_USER:-loguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loguser} -d ${POSTGRES_DB:-logdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: logredis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull tinyllama &&
        ollama pull nomic-embed-text &&
        echo 'Models ready.'
      "
    restart: "no"

  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: ingestion
    ports:
      - "8001:8001"
    environment:
      <<: [*db-env, *redis-env]
      FAULT_API_URL:    ${FAULT_API_URL:-http://localhost:5001}
      NODE_WEBHOOK_URL: ${NODE_WEBHOOK_URL:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  embedding-worker:
    build:
      context: ./services/embedding_worker
      dockerfile: Dockerfile
    container_name: embedding_worker
    environment:
      <<: [*db-env, *ollama-env]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  anomaly-detector:
    build:
      context: ./services/anomaly_detector
      dockerfile: Dockerfile
    container_name: anomaly_detector
    environment:
      <<: [*db-env, *redis-env]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    container_name: agent
    ports:
      - "8002:8002"
    environment:
      <<: [*db-env, *redis-env, *ollama-env]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ingestion:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    image: nginx:alpine
    container_name: dashboard
    ports:
      - "8080:80"
    volumes:
      - ./services/dashboard/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  ollama_models:
